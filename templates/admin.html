<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandma's Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --burgundy: #5C1A1A;
    --deep-burgundy: #3A0A0A;
    --cream: #F5E6D0;
    --aged-cream: #EDD9B8;
    --parchment: #D4B896;
    --espresso: #0F0500;
    --gold: #C9A84C;
    --shadow-gold: #8B6914;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--espresso);
    color: var(--cream);
    font-family: 'Special Elite', cursive;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .portal-frame {
    border: 2px solid var(--gold);
    padding: 48px 52px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    position: relative;
  }
  .portal-frame::before, .portal-frame::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 14px;
  }
  .portal-frame::before { top: 10px; left: 50%; transform: translateX(-50%); }
  .portal-frame::after  { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .portal-label {
    font-size: 0.6rem;
    letter-spacing: 0.45em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-style: italic;
    color: var(--cream);
    margin-bottom: 8px;
  }
  .sub {
    font-family: 'Special Elite', cursive;
    font-size: 0.75rem;
    color: var(--parchment);
    margin-bottom: 36px;
    letter-spacing: 0.05em;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider span { color: var(--gold); font-size: 0.9rem; }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
    text-align: left;
  }
  label {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
  }
  input[type="password"] {
    background: rgba(245,230,208,0.05);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream);
    font-family: 'Special Elite', cursive;
    font-size: 1rem;
    padding: 12px 16px;
    outline: none;
    width: 100%;
    transition: border-color 0.3s ease;
    letter-spacing: 0.2em;
  }
  input[type="password"]:focus { border-color: var(--gold); }
  .submit-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Special Elite', cursive;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    padding: 14px 36px;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }
  .submit-btn:hover { color: var(--espresso); }
  .submit-btn:hover::before { transform: translateX(0); }
  .submit-btn span { position: relative; z-index: 1; }
  .error {
    background: rgba(92,26,26,0.4);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--parchment);
    font-size: 0.75rem;
    padding: 10px 14px;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  .back-link {
    display: block;
    margin-top: 24px;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 1; }
</style>
</head>
<body>
<div class="portal-frame">
  <div class="portal-label">Staff Entrance</div>
  <h1>Grandma's Portal</h1>
  <p class="sub">For Chizzy's eyes only</p>
  <div class="divider"><span>✦</span></div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin">
    <div class="form-group">
      <label>Secret Word</label>
      <input type="password" name="password" placeholder="••••••••" autofocus required>
    </div>
    <button type="submit" class="submit-btn"><span>✦ Enter</span></button>
  </form>

  <a href="/" class="back-link">← back to the party</a>
</div>
</body>
</html>
